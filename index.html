<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعمك الذكي</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .menu-container { display: flex; flex-direction: column; gap: 20px; max-width: 500px; margin: auto; }
        .item-row { background: #2a2a2a; border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #444; }
        .item-img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; }
        .item-info { flex: 1; text-align: right; }
        .price-val { color: #ffcc00; font-weight: bold; font-size: 1.2rem; }
        .controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        button { background: #ffcc00; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .total-section { margin-top: 30px; padding: 20px; background: #333; border-radius: 10px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>قائمة الطعام - قصابية ومشويات علي الجد</h1>
    
    <div id="full-menu" class="menu-container">
        </div>

    <div class="total-section">
        المجموع الكلي: <span id="final-total">0</span> دينار
    </div>

    <script>
        // رابط الجدول الخاص بك (بصيغة CSV)
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgeS-1tqU7-pM_RSc_j-v86YvINgYhWwZWggLviGwbYAW/pub?output=csv";

        // قائمة الوجبات مع إضافة الأجنحة الجديدة
        const menuItems = [
            { id: 'lamb', name: 'لحم غنم', price: 5000, img: 'https://via.placeholder.com/100' },
            { id: 'beef_shrah', name: 'لحم بقر شرح', price: 4500, img: 'https://via.placeholder.com/100' },
            { id: 'kebab', name: 'كباب', price: 4500, img: 'https://via.placeholder.com/100' },
            { id: 'tikka', name: 'تكة', price: 4500, img: 'https://via.placeholder.com/100' },
            { id: 'mealak', name: 'معلاق', price: 4000, img: 'https://via.placeholder.com/100' },
            { id: 'wings', name: 'أجنحة دجاج مشوية', price: 4000, img: 'https://telegra.ph/file/photo_2026-03-08_20-59-27.jpg' }
        ];

        let cart = {};
        menuItems.forEach(item => cart[item.id] = -1);

        async function loadPrices() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                rows.forEach(row => {
                    const [id, price] = row.split(',');
                    const item = menuItems.find(i => i.id === id.trim());
                    if (item) item.price = parseInt(price);
                });
                renderItems();
            } catch (e) {
                console.error("خطأ في التحميل، سيتم استخدام الأسعار الافتراضية");
                renderItems();
            }
        }

        function renderItems() {
            const container = document.getElementById('full-menu');
            container.innerHTML = '';
            let totalSum = 0;

            menuItems.forEach(item => {
                const step = cart[item.id];
                const weightLabels = ["ربع", "نصف", "كيلو إلا ربع", "كيلو"];
                const weightText = step === -1 ? "لم يتم الاختيار" : weightLabels[step];
                const currentPrice = step === -1 ? 0 : (step + 1) * item.price;
                totalSum += currentPrice;

                container.innerHTML += `
                    <div class="item-row">
                        <img src="${item.img}" class="item-img">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <div class="price-val">سعر الربع: ${item.price.toLocaleString()}</div>
                            <div class="controls">
                                <button onclick="changeQty('${item.id}', 1)">+</button>
                                <span>${weightText}</span>
                                <button onclick="changeQty('${item.id}', -1)">-</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('final-total').innerText = totalSum.toLocaleString();
        }

        function changeQty(id, delta) {
            if (cart[id] + delta >= -1 && cart[id] + delta <= 3) {
                cart[id] += delta;
                renderItems();
            }
        }

        loadPrices();
    </script>
</body>
</html>
